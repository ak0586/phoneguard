name: lost_phone_finder
description: "Lost Phone Recovery App - Remotely control your lost Android phone via secure SMS commands."
publish_to: 'none'

version: 1.0.5+6

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.2

  # Permissions
  permission_handler: ^12.0.1

  # Location
  geolocator: ^14.0.1

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Date formatting
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

  # UUID generation for model IDs
  uuid: ^4.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  geocoding: ^4.0.0
  cloud_firestore: ^6.2.0
  google_mobile_ads: ^8.0.0
  device_info_plus: ^13.1.0
  flutter_contacts: ^2.0.2
  google_sign_in: ^7.2.0
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  url_launcher: ^6.3.2
  share_plus: ^13.1.0
  package_info_plus: ^10.1.0
  in_app_purchase: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sounds/
    - assets/images/
    - assets/images/google_logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: 'assets/images/logo.png'
  adaptive_icon_background: '#121212'
  adaptive_icon_foreground: 'assets/images/logo.png'
  min_sdk_android: 24
